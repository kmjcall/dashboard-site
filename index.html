// ── Field helpers ─────────────────────────────────────────────────────────────
const Field = ({ label, children }) => (
  <div style={{ marginBottom:14 }}>
    <label style={{ display:"block", fontSize:12, fontWeight:600, color:"#374151", marginBottom:4 }}>{label}</label>
    {children}
  </div>
);
const inp = { width:"100%", padding:"8px 10px", borderRadius:7, border:"1px solid #d1d5db", fontSize:13, boxSizing:"border-box", outline:"none" };
const TInput = ({ value, onChange, type="text", placeholder="" }) => (
  <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={inp} />
);
const TSelect = ({ value, onChange, children }) => (
  <select value={value} onChange={onChange} style={{ ...inp, background:"#fff" }}>{children}</select>
);
const Btn = ({ label, onClick, bg="#4f46e5", color="#fff" }) => (
  <button onClick={onClick} style={{ padding:"8px 18px", borderRadius:8, border:"none",
    background:bg, color, fontSize:13, fontWeight:700, cursor:"pointer" }}>{label}</button>
);

// ── EditFields ────────────────────────────────────────────────────────────────
function EditFields({ form, setForm }) {
  return (
    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 16px" }}>
      <Field label="사업명 *"><TInput value={form.name} onChange={e => setForm({ ...form, name:e.target.value })} /></Field>
      <Field label="투자대상"><TInput value={form.target||""} onChange={e => setForm({ ...form, target:e.target.value })} /></Field>
      <Field label="전략자산">
        <TSelect value={form.strategic?"O":"X"} onChange={e => setForm({ ...form, strategic:e.target.value==="O" })}>
          <option value="O">전략자산 (O)</option>
          <option value="X">수익자산 (X)</option>
        </TSelect>
      </Field>
      <Field label="중분류">
        <TSelect value={form.subcategory} onChange={e => setForm({ ...form, subcategory:e.target.value })}>
          <option>신사업</option><option>공간테크</option><option>기타</option>
        </TSelect>
      </Field>
      <Field label="투자시기(년)"><TInput value={form.invest_year} onChange={e => setForm({ ...form, invest_year:e.target.value })} /></Field>
      <Field label="투자분기">
        <TSelect value={form.invest_quarter||"Q1"} onChange={e => setForm({ ...form, invest_quarter:e.target.value })}>
          <option>Q1</option><option>Q2</option><option>Q3</option><option>Q4</option>
        </TSelect>
      </Field>
      <Field label="투자법인"><TInput value={form.invest_corp||""} onChange={e => setForm({ ...form, invest_corp:e.target.value })} /></Field>
      <Field label="운용사"><TInput value={form.manager||""} onChange={e => setForm({ ...form, manager:e.target.value })} /></Field>
      <Field label="투자방식">
        <TSelect value={form.invest_method||"직접"} onChange={e => setForm({ ...form, invest_method:e.target.value })}>
          <option>직접</option><option>간접</option><option>대여</option>
        </TSelect>
      </Field>
      <Field label="청산시기"><TInput value={form.liquidation||""} onChange={e => setForm({ ...form, liquidation:e.target.value })} /></Field>
      <Field label="투자액(억원) *"><TInput type="number" value={form.invested} onChange={e => setForm({ ...form, invested:e.target.value })} /></Field>
      <Field label="총회수액(억원)"><TInput type="number" value={form.total_recovered} onChange={e => setForm({ ...form, total_recovered:e.target.value })} /></Field>
      <Field label="수익(억원)"><TInput type="number" value={form.profit} onChange={e => setForm({ ...form, profit:e.target.value })} /></Field>
      <Field label="원금회수(억원)"><TInput type="number" value={form.principal_recovered} onChange={e => setForm({ ...form, principal_recovered:e.target.value })} /></Field>
      <Field label="비고"><TInput value={form.note||""} onChange={e => setForm({ ...form, note:e.target.value })} /></Field>
    </div>
  );
}

// ── Settings Modal ────────────────────────────────────────────────────────────
function SettingsModal({ projects, quarterly, onClose, onSave }) {
  const [localProjects, setLocalProjects] = useState(projects);
  const [localQuarterly, setLocalQuarterly] = useState(quarterly);
  const [editingId, setEditingId] = useState(null);
  const [editForm, setEditForm] = useState(null);
  const [addForm, setAddForm] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = localProjects.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) ||
    (p.target||"").toLowerCase().includes(search.toLowerCase())
  );

  const applyQuarterlyDelta = (q, year, quarter, invDelta, recDelta, proDelta) => {
    const key = year + (quarter||"Q1");
    const updated = { ...q };
    if (!updated[key]) updated[key] = { investment:0, recovery:0, profit:0 };
    updated[key] = {
      investment: Math.max(0, (updated[key].investment||0) + invDelta),
      recovery:   Math.max(0, (updated[key].recovery||0)   + recDelta),
      profit:     Math.max(0, (updated[key].profit||0)     + proDelta),
    };
    return updated;
  };

  const startEdit = (item) => {
    setEditingId(item.id);
    setEditForm({ ...item, invested:Math.abs(item.invested), contracted:Math.abs(item.contracted) });
    setAddForm(null);
  };

  const saveEdit = () => {
    const f = editForm;
    const inv = parseFloat(f.invested)||0;
    const rec = parseFloat(f.total_recovered)||0;
    const pro = parseFloat(f.profit)||0;
    const updated = { ...f, contracted:-Math.abs(parseFloat(f.contracted)||inv),
      invested:-inv, principal_recovered:parseFloat(f.principal_recovered)||0,
      profit:pro, total_recovered:rec, unrecovered:rec-inv };
    const old = localProjects.find(p => p.id === editingId);
    let newQ = localQuarterly;
    newQ = applyQuarterlyDelta(newQ, old.invest_year, old.invest_quarter, -Math.abs(old.invested), -old.total_recovered, -old.profit);
    newQ = applyQuarterlyDelta(newQ, updated.invest_year, updated.invest_quarter, inv, rec, pro);
    setLocalQuarterly(newQ);
    setLocalProjects(localProjects.map(p => p.id === editingId ? updated : p));
    setEditingId(null); setEditForm(null);
  };

  const deleteItem = (id) => {
    const item = localProjects.find(p => p.id === id);
    const newQ = applyQuarterlyDelta(localQuarterly, item.invest_year, item.invest_quarter,
      -Math.abs(item.invested), -item.total_recovered, -item.profit);
    setLocalQuarterly(newQ);
    setLocalProjects(localProjects.filter(p => p.id !== id));
    if (editingId === id) { setEditingId(null); setEditForm(null); }
  };

  const startAdd = () => { setAddForm({ ...EMPTY_ITEM, id:Date.now() }); setEditingId(null); setEditForm(null); };

  const saveAdd = () => {
    const f = addForm;
    const inv = parseFloat(f.invested)||0;
    const rec = parseFloat(f.total_recovered)||0;
    const pro = parseFloat(f.profit)||0;
    const newItem = { ...f, contracted:-Math.abs(parseFloat(f.contracted)||inv),
      invested:-inv, principal_recovered:parseFloat(f.principal_recovered)||0,
      profit:pro, total_recovered:rec, unrecovered:rec-inv };
    const newQ = applyQuarterlyDelta(localQuarterly, f.invest_year, f.invest_quarter, inv, rec, pro);
    setLocalQuarterly(newQ);
    setLocalProjects([...localProjects, newItem]);
    setAddForm(null);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.55)", display:"flex",
      alignItems:"flex-start", justifyContent:"center", zIndex:1000, overflowY:"auto", padding:"24px 16px" }}>
      <div style={{ background:"#fff", borderRadius:16, width:"100%", maxWidth:800,
        boxShadow:"0 25px 50px rgba(0,0,0,0.3)", overflow:"hidden" }}>
        <div style={{ background:"linear-gradient(135deg,#1a1a2e,#0f3460)", padding:"20px 28px",
          display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ color:"#fff", fontWeight:800, fontSize:18 }}>⚙️ 항목 관리</div>
          <button onClick={onClose} style={{ background:"rgba(255,255,255,0.15)", border:"none",
            color:"#fff", width:32, height:32, borderRadius:8, cursor:"pointer", fontSize:18 }}>×</button>
        </div>
        <div style={{ padding:"24px 28px", maxHeight:"70vh", overflowY:"auto" }}>
          <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 사업명/대상 검색..."
              style={{ flex:1, padding:"9px 12px", borderRadius:8, border:"1px solid #d1d5db", fontSize:13, outline:"none" }} />
            {!addForm && <Btn label="+ 신규 항목 추가" onClick={startAdd} bg="#10b981" />}
          </div>

          {addForm && (
            <div style={{ background:"#f0fdf4", borderRadius:10, padding:20, marginBottom:16, border:"1px solid #bbf7d0" }}>
              <div style={{ fontWeight:800, fontSize:14, color:"#065f46", marginBottom:16 }}>➕ 신규 투자항목 추가</div>
              <EditFields form={addForm} setForm={setAddForm} />
              <div style={{ display:"flex", gap:8, marginTop:8 }}>
                <Btn label="저장" onClick={saveAdd} bg="#10b981" />
                <Btn label="취소" onClick={() => setAddForm(null)} bg="#f3f4f6" color="#555" />
              </div>
            </div>
          )}

          <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
            {filtered.map(item => {
              const isEditing = editingId === item.id;
              return (
                <div key={item.id} style={{ border:"1px solid #e5e7eb", borderRadius:10, overflow:"hidden" }}>
                  <div style={{ display:"flex", alignItems:"center", padding:"12px 14px", gap:10,
                    background:isEditing?"#eef2ff":"#fafafa" }}>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:700, fontSize:13, color:"#1a1a2e",
                        whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{item.name}</div>
                      <div style={{ fontSize:11, color:"#94a3b8", marginTop:2 }}>
                        {item.invest_year} · {item.strategic?"전략":"비전략"} · {item.subcategory} · 투자 {fmt(Math.abs(item.invested))}억
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                      {!isEditing && (
                        <button onClick={() => startEdit(item)}
                          style={{ padding:"5px 12px", borderRadius:6, border:"1px solid #4f46e5",
                            background:"#fff", color:"#4f46e5", fontSize:12, fontWeight:600, cursor:"pointer" }}>수정</button>
                      )}
                      <button onClick={() => deleteItem(item.id)}
                        style={{ padding:"5px 12px", borderRadius:6, border:"1px solid #ef4444",
                          background:"#fff", color:"#ef4444", fontSize:12, fontWeight:600, cursor:"pointer" }}>삭제</button>
                    </div>
                  </div>
                  {isEditing && editForm && (
                    <div style={{ padding:"16px 14px", borderTop:"1px solid #e0e7ff", background:"#fafbff" }}>
                      <EditFields form={editForm} setForm={setEditForm} />
                      <div style={{ display:"flex", gap:8, marginTop:4 }}>
                        <Btn label="저장" onClick={saveEdit} />
                        <Btn label="취소" onClick={() => { setEditingId(null); setEditForm(null); }} bg="#f3f4f6" color="#555" />
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            {filtered.length === 0 && (
              <div style={{ textAlign:"center", color:"#aaa", padding:32 }}>검색 결과가 없습니다</div>
            )}
          </div>
        </div>
        <div style={{ padding:"16px 28px", borderTop:"1px solid #f1f5f9", display:"flex", justifyContent:"space-between", alignItems:"center", gap:10 }}>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={() => {
              if(confirm("저장된 데이터를 초기화하고 기본 데이터로 되돌릴까요?")) {
                localStorage.removeItem("inv_projects");
                localStorage.removeItem("inv_quarterly");
                window.location.reload();
              }
            }} style={{ padding:"8px 14px", borderRadius:8, border:"1px solid #f59e0b", background:"#fffbeb",
              color:"#b45309", fontWeight:700, fontSize:12, cursor:"pointer" }}>
              🔄 기본 데이터로 초기화
            </button>
            <button onClick={() => {
              const data = JSON.stringify({ projects: localProjects, quarterly: localQuarterly }, null, 2);
              const blob = new Blob([data], { type:"application/json" });
              const url = URL.createObjectURL(blob);
              const a = document.createElement("a");
              a.href = url; a.download = "investment_data.json"; a.click();
              URL.revokeObjectURL(url);
            }} style={{ padding:"8px 14px", borderRadius:8, border:"1px solid #4f46e5", background:"#eef2ff",
              color:"#4f46e5", fontWeight:700, fontSize:12, cursor:"pointer" }}>
              📥 데이터 내보내기(JSON)
            </button>
            <label style={{ padding:"8px 14px", borderRadius:8, border:"1px solid #0ea5e9", background:"#e0f2fe",
              color:"#0369a1", fontWeight:700, fontSize:12, cursor:"pointer" }}>
              📂 데이터 불러오기(JSON)
              <input type="file" accept=".json" style={{ display:"none" }} onChange={e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                  try {
                    const parsed = JSON.parse(ev.target.result);
                    if (parsed.projects) setLocalProjects(parsed.projects);
                    if (parsed.quarterly) setLocalQuarterly(parsed.quarterly);
                    alert("✅ 데이터를 성공적으로 불러왔습니다. '저장 후 닫기'를 눌러 적용하세요.");
                  } catch { alert("❌ JSON 파일 형식이 올바르지 않습니다."); }
                };
                reader.readAsText(file);
                e.target.value = "";
              }} />
            </label>
          </div>
          <div style={{ display:"flex", gap:10 }}>
            <Btn label="저장 후 닫기" onClick={() => onSave(localProjects, localQuarterly)} />
            <Btn label="닫기" onClick={onClose} bg="#f3f4f6" color="#555" />
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function InvestmentDashboard() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [projects, setProjects] = useState(() => {
    try {
      const saved = localStorage.getItem("inv_projects");
      return saved ? JSON.parse(saved) : SEED_PROJECTS;
    } catch { return SEED_PROJECTS; }
  });
  const [quarterly, setQuarterly] = useState(() => {
    try {
      const saved = localStorage.getItem("inv_quarterly");
      return saved ? JSON.parse(saved) : SEED_QUARTERLY;
    } catch { return SEED_QUARTERLY; }
  });

  const saveToStorage = useCallback((newProjects, newQuarterly) => {
    try {
      localStorage.setItem("inv_projects", JSON.stringify(newProjects));
      localStorage.setItem("inv_quarterly", JSON.stringify(newQuarterly));
    } catch(e) { console.warn("저장 실패:", e); }
  }, []);
  const [activeTab, setActiveTab] = useState("overview");
  const [selectedStrategic, setSelectedStrategic] = useState("all");
  const [selectedSubcat, setSelectedSubcat] = useState("all");
  const [selectedQuarterRange, setSelectedQuarterRange] = useState("all");
  const [expandedItem, setExpandedItem] = useState(null);
  const [issueFilter, setIssueFilter] = useState(false);
  const [sortOrder, setSortOrder] = useState("name");
  const [showSettings, setShowSettings] = useState(false);

  const handleSettingsSave = useCallback((newProjects, newQuarterly) => {
    setProjects(newProjects);
    setQuarterly(newQuarterly);
    saveToStorage(newProjects, newQuarterly);
    setShowSettings(false);
  }, [saveToStorage]);

  const filteredProjects = useMemo(() => projects.filter(r => {
    if (selectedStrategic === "strategic" && !r.strategic) return false;
    if (selectedStrategic === "nonstrategic" && r.strategic) return false;
    if (selectedSubcat !== "all" && r.subcategory !== selectedSubcat) return false;
    if (issueFilter && (getIssues(r).length === 0 || (r.note||"").includes("손상차손"))) return false;
    return true;
  }), [projects, selectedStrategic, selectedSubcat, issueFilter]);

  const totalInvested = useMemo(() => filteredProjects.reduce((s,r) => s + Math.abs(r.invested), 0), [filteredProjects]);
  const totalRecovered = useMemo(() => filteredProjects.reduce((s,r) => s + r.total_recovered, 0), [filteredProjects]);
  const totalProfit = useMemo(() => filteredProjects.reduce((s,r) => s + r.profit, 0), [filteredProjects]);
  const returnRate = totalInvested > 0 ? (totalProfit / totalInvested * 100) : 0;

  const categoryBreakdown = useMemo(() => {
    const groups = {};
    filteredProjects.forEach(r => {
      const key = r.strategic ? "전략자산" : "수익자산";
      if (!groups[key]) groups[key] = { invested:0, recovered:0, profit:0, count:0 };
      groups[key].invested += Math.abs(r.invested);
      groups[key].recovered += r.total_recovered;
      groups[key].profit += r.profit;
      groups[key].count++;
    });
    return Object.entries(groups).map(([name,v]) => ({ name, ...v, returnRate:v.invested>0?v.profit/v.invested*100:0 }));
  }, [filteredProjects]);

  const subcatBreakdown = useMemo(() => {
    const order = ["신사업","공간테크","기타"];
    const groups = {};
    // 항상 3개 카테고리 초기화
    order.forEach(k => { groups[k] = { invested:0, recovered:0, profit:0, count:0 }; });
    filteredProjects.forEach(r => {
      const key = order.includes(r.subcategory) ? r.subcategory : "기타";
      groups[key].invested += Math.abs(r.invested);
      groups[key].recovered += r.total_recovered;
      groups[key].profit += r.profit;
      groups[key].count++;
    });
    return order.map(name => ({ name, ...groups[name] }));
  }, [filteredProjects]);

  const quarterlyChartData = useMemo(() => {
    // filteredProjects에서 직접 집계
    const groups = {};
    filteredProjects.forEach(r => {
      const key = (r.invest_year||"미상") + (r.invest_quarter||"Q1");
      if (!groups[key]) groups[key] = { investment:0, recovery:0, profit:0 };
      groups[key].investment += Math.abs(r.invested);
      groups[key].recovery  += r.total_recovered;
      groups[key].profit    += r.profit;
    });
    const entries = Object.entries(groups).sort(([a],[b]) => a.localeCompare(b));
    const filtered = (selectedQuarterRange === "all" || selectedQuarterRange === "recent") ? entries
      : entries.filter(([k]) => k.startsWith(String(selectedQuarterRange)));
    return filtered.map(([key,v]) => ({
      quarter: key,
      투자: Math.round((v.investment||0)*10)/10,
      회수: Math.round((v.recovery||0)*10)/10,
      수익: Math.round((v.profit||0)*10)/10,
    }));
  }, [filteredProjects, selectedQuarterRange]);

  const annualChartData = useMemo(() => {
    // SEED_ANNUAL: 엑셀 합계행의 연도별 실제 출자/회수/수익 데이터 (억원)
    // 필터 적용 시 filteredProjects 비율로 스케일링
    const totalAllInvested = SEED_PROJECTS.reduce((s,r) => s + Math.abs(r.invested), 0);
    const totalFilteredInvested = filteredProjects.reduce((s,r) => s + Math.abs(r.invested), 0);
    const ratio = totalAllInvested > 0 ? totalFilteredInvested / totalAllInvested : 1;

    return Object.entries(SEED_ANNUAL)
      .filter(([year]) => year !== "2026")
      .sort(([a],[b]) => Number(a)-Number(b))
      .map(([year, v]) => ({
        year: year + "년",
        투자: Math.round((v.investment || 0) * ratio * 10) / 10,
        회수: Math.round((v.recovery  || 0) * ratio * 10) / 10,
        수익: Math.round((v.profit    || 0) * ratio * 10) / 10,
      }));
  }, [filteredProjects]);

  const pieData = subcatBreakdown.map(s => ({ name:s.name, value:Math.round(s.invested) }));
  const categoryPieData = useMemo(() => categoryBreakdown.map(s => ({ name:s.name, value:Math.round(s.invested) })), [categoryBreakdown]);
  const PIE_COLORS = ["#4f46e5","#0ea5e9","#f59e0b","#10b981"];
  const allYears = useMemo(() => [...new Set(filteredProjects.map(r => r.invest_year).filter(Boolean))].sort(), [filteredProjects]);

  if (!loggedIn) return <LoginScreen onLogin={() => setLoggedIn(true)} />;

  const handleExcelUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const wb = XLSX.read(ev.target.result, { type:"array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });

        const newProjects = [];
        for (let i = 5; i < rows.length; i++) {
          const r = rows[i];
          const name = String(r[2]||"").trim();
          if (!name || name === "합계" || name === "소계") continue;
          const invested = parseFloat(r[8]||0) || 0;
          if (invested === 0 && !name) continue;
          newProjects.push({
            id: i,
            name,
            target:        String(r[3]||"").trim(),
            strategic:     String(r[0]||"").includes("전략"),
            subcategory:   String(r[1]||"").trim() || "기타",
            invest_year:   parseInt(r[4])||null,
            invest_quarter:String(r[5]||"").trim()||null,
            invest_corp:   String(r[6]||"").trim(),
            invest_method: String(r[7]||"").trim(),
            contracted:    -(Math.abs(parseFloat(r[8]||0)||0)),
            invested:      -(Math.abs(parseFloat(r[9]||0)||0)),
            principal_recovered: parseFloat(r[10]||0)||0,
            profit:        parseFloat(r[11]||0)||0,
            total_recovered:    (parseFloat(r[10]||0)||0) + (parseFloat(r[11]||0)||0),
            unrecovered:   -(Math.abs(parseFloat(r[12]||0)||0)),
            manager:       String(r[13]||"").trim(),
            note:          String(r[14]||"").trim(),
          });
        }
        if (newProjects.length === 0) { alert("❌ 데이터를 찾을 수 없습니다. 엑셀 형식을 확인해주세요."); return; }
        setProjects(newProjects);
        saveToStorage(newProjects, quarterly);
        alert(`✅ 엑셀 데이터 반영 완료! (${newProjects.length}개 항목)`);
      } catch(err) {
        alert("❌ 파싱 오류: " + err.message);
      }
      e.target.value = "";
    };
    reader.readAsArrayBuffer(file);
  };

  const tabStyle = id => ({
    padding:"10px 22px", borderRadius:8, cursor:"pointer", fontWeight:700, fontSize:14, transition:"all 0.2s",
    background: activeTab===id ? "#4f46e5" : "#fff",

    border: activeTab===id ? "2px solid #4f46e5" : "2px solid #d1d5db",
  });
  const tdR = { padding:"10px", borderBottom:"1px solid #f1f5f9", textAlign:"right", fontSize:13 };
  const tdL = { padding:"10px", borderBottom:"1px solid #f1f5f9", textAlign:"left", fontSize:14, fontWeight:700, color:"#111" };

  return (
    <div style={{ fontFamily:"'Noto Sans KR',sans-serif", background:"#f8f9fb", minHeight:"100vh" }}>
    <style>{`
      * { box-sizing: border-box; }
      @media (max-width: 640px) {
        .dash-header { padding: 14px 16px !important; }
        .dash-header-inner { flex-direction: column !important; gap: 10px !important; align-items: flex-start !important; }
        .dash-header-buttons { flex-wrap: wrap !important; gap: 6px !important; }
        .dash-header-buttons button, .dash-header-buttons label { padding: 5px 10px !important; font-size: 11px !important; }
        .dash-title { font-size: 18px !important; }
        .dash-body { padding: 12px 12px !important; }
        .dash-tabs { gap: 6px !important; margin-bottom: 16px !important; }
        .dash-tabs button { padding: 7px 10px !important; font-size: 12px !important; }
        .dash-kpi-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
        .kpi-card { padding: 10px 12px 12px !important; }
        .kpi-value { font-size: 16px !important; word-break: break-all !important; }
        .kpi-sub { font-size: 10px !important; margin-top: 3px !important; }
        .dash-kpi-value { font-size: 16px !important; }
        .dash-kpi-sub { font-size: 10px !important; }
        .dash-two-col { grid-template-columns: 1fr !important; gap: 12px !important; }
        .dash-card { padding: 14px 12px !important; }
        .dash-filters { gap: 6px !important; margin-bottom: 14px !important; }
        .dash-filters span { font-size: 12px !important; }
        .dash-filters button { padding: 4px 9px !important; font-size: 11px !important; }
        .dash-sort-row { flex-wrap: wrap !important; gap: 6px !important; }
        .port-grid { grid-template-columns: 1fr !important; }
        .port-card { padding: 12px !important; }
        table { font-size: 11px !important; width: 100% !important; }
        td, th { padding: 6px 5px !important; }
        .chart-wrap { height: 200px !important; }
      }
    `}</style>
      {showSettings && (
        <SettingsModal projects={projects} quarterly={quarterly}
          onClose={() => setShowSettings(false)} onSave={handleSettingsSave} />
      )}

      {/* Header */}
      <div className="dash-header" style={{ background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)", padding:"28px 32px", color:"#fff" }}>
        <div className="dash-header-inner" style={{ maxWidth:1200, margin:"0 auto", display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>

            <div>
              <div style={{ fontSize:11, color:"#a5b4fc", letterSpacing:2, marginBottom:6, textTransform:"uppercase" }}>투자사업팀</div>
              <h1 className="dash-title" style={{ margin:0, fontSize:26, fontWeight:900 }}>투자자산 현황</h1>
              <div style={{ fontSize:13, color:"#94a3b8", marginTop:6 }}>기준일: 2025.11.14</div>
            </div>
          </div>
          <div className="dash-header-buttons" style={{ display:"flex", gap:8 }}>
            <label style={{ background:"rgba(16,185,129,0.2)", border:"1px solid rgba(16,185,129,0.5)",
                color:"#6ee7b7", padding:"8px 16px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600 }}>
              📂 자료추가
              <input type="file" accept=".xlsx,.xls" style={{ display:"none" }} onChange={handleExcelUpload} />
            </label>
            <button onClick={() => setShowSettings(true)}
              style={{ background:"rgba(255,255,255,0.15)", border:"1px solid rgba(255,255,255,0.25)",
                color:"#fff", padding:"8px 16px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600 }}>
              ⚙️ 설정</button>
            <button onClick={() => setLoggedIn(false)}
              style={{ background:"rgba(255,255,255,0.1)", border:"1px solid rgba(255,255,255,0.2)",
                color:"#cbd5e1", padding:"7px 16px", borderRadius:8, cursor:"pointer", fontSize:13, fontWeight:600 }}>
              🔒 로그아웃</button>
          </div>
        </div>
      </div>

      <div className="dash-body" style={{ maxWidth:1200, margin:"0 auto", padding:"24px 20px" }}>
        {/* Tabs */}
        <div className="dash-tabs" style={{ display:"flex", gap:8, marginBottom:24 }}>
          {[{id:"overview",label:"종합현황"},{id:"quarterly",label:"분기별 내역"},{id:"projects",label:"항목별 현황"}]
            .map(t => <button key={t.id} style={tabStyle(t.id)} onClick={() => { setActiveTab(t.id); setIssueFilter(false); setSelectedStrategic("all"); setSelectedSubcat("all"); setSortOrder("name"); }}>{t.label}</button>)}
        </div>

        {/* Filters */}
        <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:20 }}>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:13, color:"#111", fontWeight:800, minWidth:48 }}>대분류:</span>
            {[["all","전체"],["strategic","전략자산"],["nonstrategic","수익자산"]].map(([v,l]) => (
              <button key={v} onClick={() => setSelectedStrategic(v)}
                style={{ padding:"6px 14px", borderRadius:6, border:"1px solid #e2e8f0", cursor:"pointer", fontSize:12,
                  background:selectedStrategic===v?"#4f46e5":"#fff", color:selectedStrategic===v?"#fff":"#555", fontWeight:600 }}>{l}</button>
            ))}
          </div>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontSize:13, color:"#111", fontWeight:800, minWidth:48 }}>중분류:</span>
            {[["all","전체"],["신사업","신사업"],["공간테크","공간테크"],["기타","기타"]].map(([v,l]) => (
              <button key={v} onClick={() => setSelectedSubcat(v)}
                style={{ padding:"6px 14px", borderRadius:6, border:"1px solid #e2e8f0", cursor:"pointer", fontSize:12,
                  background:selectedSubcat===v?"#4f46e5":"#fff", color:selectedSubcat===v?"#fff":"#555", fontWeight:600 }}>{l}</button>
            ))}
          </div>
          {activeTab === "quarterly" && (
            <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
              <span style={{ fontSize:13, color:"#111", fontWeight:800, minWidth:48 }}>연도:</span>
              {["all","recent",...allYears].map(y => (
                <button key={y} onClick={() => setSelectedQuarterRange(y)}
                  style={{ padding:"6px 14px", borderRadius:6, border:"1px solid #e2e8f0", cursor:"pointer", fontSize:12,
                    background:selectedQuarterRange===y?"#4f46e5":"#fff", color:selectedQuarterRange===y?"#fff":"#555", fontWeight:600 }}>
                  {y==="all"?"전체":y==="recent"?"직전4분":String(y).slice(2)+"년"}</button>
              ))}
            </div>
          )}
          {activeTab === "projects" && (
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>
              <span style={{ fontSize:13, color:"#111", fontWeight:800, minWidth:48 }}>정렬:</span>
              {[{id:"invested",label:"투자액순"},{id:"recovered",label:"회수액순"},{id:"returnRate",label:"수익률순"},{id:"investYear",label:"투자시기순"}].map(s => (
                <button key={s.id} onClick={() => { setSortOrder(s.id); setIssueFilter(false); }}
                  style={{ padding:"6px 12px", borderRadius:6, cursor:"pointer", fontSize:12, fontWeight:600,
                    background: sortOrder===s.id ? "#4f46e5" : "#fff",
                    color: sortOrder===s.id ? "#fff" : "#555",
                    border: sortOrder===s.id ? "2px solid #4f46e5" : "2px solid #d1d5db" }}>

                                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div>
                                      <div style={{ fontSize:11, color:"#94a3b8", marginTop:2, minHeight:15,
                                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.target||""}</div>
                                    </div>
                                    {/* 수치 */}
                                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr",
                                      borderTop: hasIssue?"1px solid #fecaca":hasRecovery?"1px solid #bae6fd":"1px solid #ddd6fe",
                                      padding:"8px 0" }}>
                                      {[
                                        { label:"투자액", value:Math.round(invested*10)/10+"억", color:"#4f46e5" },
                                        { label:"회수액", value:Math.round(recovered*10)/10+"억", color:"#0ea5e9" },
                                        { label:"수익률", value:Math.round(rr*10)/10+"%",
                                          color: rr>=10?"#10b981":rr>0?"#f59e0b":"#ef4444" },
                                      ].map((s,si) => (
                                        <div key={s.label} style={{ textAlign:"center", padding:"0 6px",
                                          borderRight: si<2?(hasIssue?"1px solid #fecaca":hasRecovery?"1px solid #bae6fd":"1px solid #ddd6fe"):"none" }}>
                                          <div style={{ fontSize:10, color:"#aaa", marginBottom:2 }}>{s.label}</div>
                                          <div style={{ fontSize:12, fontWeight:800, color:s.color }}>{s.value}</div>
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        )}

        {/* ── PROJECTS TAB ── */}
        {activeTab === "projects" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
              <div style={{ fontSize:13, color:"#888" }}>
                총 <strong style={{ color:"#1a1a2e" }}>{filteredProjects.length}</strong>개 항목 ·
                이슈 <strong style={{ color:"#ef4444" }}>{filteredProjects.filter(r=>getIssues(r).length>0).length}</strong>건
              </div>
              <button onClick={() => setShowSettings(true)}
                style={{ padding:"7px 16px", borderRadius:8, border:"1px solid #10b981", background:"#f0fdf4",
                  color:"#065f46", fontSize:12, fontWeight:700, cursor:"pointer" }}>➕ 항목 추가 / 수정</button>
            </div>
            {(() => {
              const sortedItems = [...filteredProjects].sort((a,b) => {
                const damA = (a.note||"").includes("손상차손")?1:0;
                const damB = (b.note||"").includes("손상차손")?1:0;
                if (damA !== damB) return damA - damB;
                if (sortOrder==="name") return (a.name||"").localeCompare(b.name||"", "ko");
                if (sortOrder==="invested") return Math.abs(b.invested) - Math.abs(a.invested);
                if (sortOrder==="recovered") return b.total_recovered - a.total_recovered;
                if (sortOrder==="returnRate") {
                  const ra = Math.abs(a.invested)>0?a.profit/Math.abs(a.invested):0;
                  const rb = Math.abs(b.invested)>0?b.profit/Math.abs(b.invested):0;
                  return rb - ra;
                }
                if (sortOrder==="investYear") {
                  const ya = (a.invest_year||9999)*10+(parseInt((a.invest_quarter||"Q4").replace("Q",""))||4);
                  const yb = (b.invest_year||9999)*10+(parseInt((b.invest_quarter||"Q4").replace("Q",""))||4);
                  return yb - ya;
                }
                return 0;
              });
              const nonDamageItems = sortedItems.filter(p => !(p.note||"").includes("손상차손"));
              const issueItems     = sortedItems.filter(p => getIssues(p).length>0 && !(p.note||"").includes("손상차손"));
              const damageItems    = sortedItems.filter(p => (p.note||"").includes("손상차손"));
              const Divider = ({label, count, color}) => (
                <div style={{ gridColumn:"1/-1", display:"flex", alignItems:"center", gap:10, margin:"8px 0 4px" }}>
                  <div style={{ height:2, flex:1, background: color+"33", borderRadius:2 }} />
                  <span style={{ fontSize:11, fontWeight:700, color, whiteSpace:"nowrap",
                    background: color+"15", padding:"3px 10px", borderRadius:20 }}>
                    {label} {count}건
                  </span>
                  <div style={{ height:2, flex:1, background: color+"33", borderRadius:2 }} />
                </div>
              );
              const renderCards = (list) => list.map(item => {
                const issues = getIssues(item);
                const invested = Math.abs(item.invested);
                const isExpanded = expandedItem === item.id;
                const rr = invested > 0 ? (item.profit/invested*100) : 0;
                const hasIssue = issues.length > 0;
                const isDamaged = (item.note||"").includes("손상차손");
                // 이슈필터 활성 시 1분기 이내 여부 판정
                const _now = new Date();
                const _curY = _now.getFullYear(), _curQ = Math.ceil((_now.getMonth()+1)/3);
                const _curIdx = _curY * 4 + _curQ;
                const _itemIdx = Number(item.invest_year||0) * 4 + (parseInt((item.invest_quarter||"Q1").replace("Q",""))||1);
                const isRecentIssue = hasIssue && (_curIdx - _itemIdx) <= 1;
                // 이슈필터 ON일 때: 1분기이내=진한빨강, 그외=옅은빨강 / 필터 OFF: 기존
                const _anyRecent = issueFilter && filteredProjects.some(r => {
                  const ri = Number(r.invest_year||0)*4+(parseInt((r.invest_quarter||"Q1").replace("Q",""))||1);
                  return getIssues(r).length>0 && (_curIdx - ri) <= 1;
                });
                // 손상자산: 회색 계열
                const cardBg    = isDamaged ? "#f0f0f0"
                  : !hasIssue ? "#f4f5f7"
                  : issueFilter && isRecentIssue  ? "#ffd6d6"
                  : issueFilter && !isRecentIssue && _anyRecent ? "#fff4f4"
                  : "#fff5f5";
                const cardBorder = isDamaged ? "2px solid #c0c0c0"
                  : !hasIssue ? "2px solid #e2e4e9"
                  : issueFilter && isRecentIssue  ? "2px solid #c53030"
                  : issueFilter && !isRecentIssue && _anyRecent ? "2px solid #fecaca"
                  : "2px solid #ef4444";
                const cardGrad  = isDamaged ? "linear-gradient(135deg,#e0e0e0,#f0f0f0)"
                  : !hasIssue ? "linear-gradient(135deg,#eaecf0,#f4f5f7)"
                  : issueFilter && isRecentIssue  ? "linear-gradient(135deg,#ffb3b3,#ffd6d6)"
                  : issueFilter && !isRecentIssue && _anyRecent ? "linear-gradient(135deg,#ffe4e4,#fff4f4)"
                  : "linear-gradient(135deg,#ffe4e4,#fff5f5)";
                return (
                  <div key={item.id} onClick={() => setExpandedItem(isExpanded?null:item.id)}
                    style={{ background: cardBg, borderRadius:12, cursor:"pointer",
                      border: cardBorder,
                      transition:"box-shadow 0.2s", overflow:"hidden" }}>
                    {/* Card header */}
                    <div style={{ padding:"14px 16px 10px", background: cardGrad }}>
                      <div style={{ display:"flex", alignItems:"center", gap:6, marginBottom:6 }}>
                        <span style={{ fontSize:10, fontWeight:700, padding:"2px 7px", borderRadius:4,
                          background:item.strategic?"#ede9fe":"#e0f2fe",
                          color:item.strategic?"#7c3aed":"#0284c7" }}>
                          {item.strategic?"전략":"비전략"}</span>
                        <span style={{ fontSize:10, fontWeight:600, padding:"2px 7px", borderRadius:4,
                          background:item.subcategory==="신사업"?"#fef3c7":item.subcategory==="공간테크"?"#d1fae5":"#f3f4f6",
                          color:item.subcategory==="신사업"?"#b45309":item.subcategory==="공간테크"?"#065f46":"#6b7280" }}>
                          {item.subcategory}</span>
                        {isDamaged && <span style={{ fontSize:10, color:"#888", fontWeight:700, marginLeft:"auto" }}>🔻 손상</span>}
                        {!isDamaged && hasIssue && <span style={{ fontSize:10, color:"#ef4444", fontWeight:700, marginLeft:"auto" }}>⚠️ 이슈</span>}
                      </div>
                      <div style={{ fontWeight:700, fontSize:14, color:"#1a1a2e",
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{item.name}</div>
                      <div style={{ fontSize:11, color:"#94a3b8", marginTop:2,
                        overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", minHeight:16 }}>
                        {item.target || ""}
                      </div>
                    </div>
                    {/* Stats row */}
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr",
                      borderTop: hasIssue ? "1px solid #fecaca" : "1px solid #dde0e6", padding:"10px 0" }}>
                      {[
                        { label:"투자액", value:fmt(invested)+"억", color:"#4f46e5" },
                        { label:"회수액", value:fmt(item.total_recovered)+"억", color:"#0ea5e9" },
                        { label:"수익률", value:fmt(rr)+"%", color:rr>=10?"#10b981":rr>0?"#f59e0b":"#ef4444" },
                      ].map(s => (
                        <div key={s.label} style={{ textAlign:"center", padding:"0 8px",
                          borderRight:s.label!=="수익률" ? (hasIssue?"1px solid #fecaca":"1px solid #dde0e6") : "none" }}>
                          <div style={{ fontSize:10, color:"#aaa", marginBottom:3 }}>{s.label}</div>
                          <div style={{ fontSize:13, fontWeight:800, color:s.color }}>{s.value}</div>
                        </div>
                      ))}
                    </div>
                    {/* Expanded detail */}
                    {isExpanded && (
                      <div style={{ borderTop: hasIssue ? "1px solid #fecaca" : "1px solid #dde0e6",
                        padding:"12px 16px", background: hasIssue ? "#fff0f0" : "#ebebee" }}>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
                          {[
                            { label:"투자시기", value:item.invest_year||(item.invest_quarter||"") },
                            { label:"투자법인", value:item.invest_corp||"-" },
                            { label:"투자방식", value:item.invest_method||"-" },
                            { label:"운용사",   value:item.manager||"-" },
                            { label:"약정총액", value:fmt(Math.abs(item.contracted))+"억" },
                            { label:"원금회수", value:fmt(item.principal_recovered)+"억" },
                            { label:"수익",     value:fmt(item.profit)+"억",
                              highlight:item.profit>0?"#10b981":item.profit<0?"#ef4444":undefined },
                            { label:"미회수잔액", value:fmt(Math.abs(item.unrecovered))+"억",
                              highlight:item.unrecovered<-10?"#ef4444":undefined },
                          ].map(f => (
                            <div key={f.label} style={{ background:"#fff", borderRadius:7, padding:"8px 10px",
                              border: hasIssue ? "1px solid #fecaca" : "1px solid #d4d7de" }}>
                              <div style={{ fontSize:10, color:"#aaa", marginBottom:2 }}>{f.label}</div>
                              <div style={{ fontSize:12, fontWeight:700, color:f.highlight||"#1a1a2e" }}>{f.value}</div>
                            </div>
                          ))}
                        </div>
                        {hasIssue && (
                          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                            <div style={{ padding:"10px 12px", background:"#f8f9ff", borderRadius:8,
                              border:"1px solid #c7d2fe" }}>
                              <div style={{ fontSize:11, fontWeight:700, color:"#4f46e5", marginBottom:6 }}>📋 상세</div>
                              <div style={{ fontSize:11, color:"#555" }}>—</div>
                            </div>
                            <div style={{ padding:"10px 12px", background:"#fff5f5", borderRadius:8,
                              border:"1px solid #fecaca" }}>
                              <div style={{ fontSize:11, fontWeight:700, color:"#ef4444", marginBottom:6 }}>🚨 이슈사항</div>
                              {issues.map((issue,i) => (
                                <div key={i} style={{ fontSize:11, color:"#dc2626", marginBottom:2 }}>• {issue}</div>
                              ))}
                            </div>
                          </div>
                        )}
                        {!hasIssue && (
                          <div style={{ padding:"10px 12px", background:"#f8f9ff", borderRadius:8,
                            border:"1px solid #c7d2fe" }}>
                            <div style={{ fontSize:11, fontWeight:700, color:"#4f46e5", marginBottom:6 }}>📋 상세</div>
                            <div style={{ fontSize:11, color:"#555" }}>—</div>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              });
              return (
                <div className="port-grid" style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(280px, 1fr))", gap:12 }}>
                  {renderCards(nonDamageItems)}
                  {damageItems.length > 0 && <Divider label="🔻 손상 항목" count={damageItems.length} color="#9ca3af" />}
                  {renderCards(damageItems)}
                </div>
              );
            })()}
          </div>
        )}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(InvestmentDashboard));
  </script>
</body>
</html>
